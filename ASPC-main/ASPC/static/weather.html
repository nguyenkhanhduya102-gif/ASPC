<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dự báo thời tiết</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style_index.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style_weather.css') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js" defer></script>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">A S P C</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="./index.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="./history.html">Lịch Sử</a></li>
        <li class="nav-item"><a class="nav-link" href="./parameter.html">Thông Số</a></li>
        <li class="nav-item"><a class="nav-link" href="./health.html">Sức Khỏe</a></li>
        <li class="nav-item"><a class="nav-link active" href="./weather.html">Thời tiết</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="container pt-4">
    <section class="section-card mb-4">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
            <h2 class="m-0"><i class="fas fa-cloud-sun"></i> Dự báo thời tiết (24h)</h2>
            <div class="d-flex align-items-center gap-2">
                <span class="text-muted small" id="weather-updated">--</span>
                <button id="weather-refresh" class="btn btn-sm btn-primary">
                    <i class="fas fa-sync-alt"></i> Tải lại
                </button>
            </div>
        </div>

        <div class="weather-summary mt-3">
            <div class="weather-pill">
                <div class="label">Khu vực</div>
                <div class="value" id="weather-location">--</div>
            </div>
            <div class="weather-pill">
                <div class="label">Nhiệt độ (mốc gần nhất)</div>
                <div class="value" id="weather-temp">--</div>
            </div>
            <div class="weather-pill">
                <div class="label">Độ ẩm</div>
                <div class="value" id="weather-humidity">--</div>
            </div>
            <div class="weather-pill">
                <div class="label">Mây</div>
                <div class="value" id="weather-clouds">--</div>
            </div>
            <div class="weather-pill">
                <div class="label">Gió</div>
                <div class="value" id="weather-wind">--</div>
            </div>
            <div class="weather-pill">
                <div class="label">Mô tả</div>
                <div class="value" id="weather-desc">--</div>
            </div>
        </div>

        <div id="weather-error" class="alert alert-warning mt-3" style="display:none;"></div>

        <div class="table-responsive mt-3">
            <table class="table table-striped table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th>Thời gian</th>
                        <th>Nhiệt độ (°C)</th>
                        <th>Độ ẩm (%)</th>
                        <th>Mây (%)</th>
                        <th>Gió (m/s)</th>
                        <th>Thời tiết</th>
                    </tr>
                </thead>
                <tbody id="weather-rows">
                    <tr>
                        <td colspan="6" class="text-muted">Đang tải dữ liệu...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/weather.js') }}"></script>
</body>
</html>
